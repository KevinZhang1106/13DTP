{% extends "base.html" %}
{% block title %}My Listings — Market{% endblock %}

{% block content %}
<h1>My Listings</h1>

{% for listing in listings %}
    <div>
        {% if listing.image_filename %}
            <img src="{{ url_for('static', filename='uploads/' ~ listing.image_filename)}}" width="200">
        {% else %}
            <p>no image</p>
        {% endif %}
        <h3>{{ listing.title }}</h3>
        <p>{{ listing.price }}</p>
        <a href="{{ url_for('edit_listing', listing_id=listing.id) }}">Edit</a>
        <form method="POST" action="{{ url_for('delete_listing', listing_id=listing.id) }}">
            <button type="submit">Delete</button>
        </form>
    </div>
{% endfor %}

{% endblock %}
